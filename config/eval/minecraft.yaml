defaults:
  - launcher: local
  - solver: cem
  - data: minecraft
  - _self_

num_workers: 8
train_split: 0.995
seed: 3072
img_size: 224
patch_size: 14
encoder_scale: tiny
dump_object: True




wandb:
  enabled: True
  config:
    entity: oopsyoudied88-aaa
    project: my_train_true1
    name: ${output_model_name}
    id: ${subdir}
    resume: allow
    log_model: all
wm:
  type: lewm
  history_size: 3
  num_preds: 1
  embed_dim: 192

predictor:
  depth: 6
  heads: 16
  mlp_dim: 2048
  dim_head: 64
  dropout: 0.1
  emb_dropout: 0.0

loss:
  sigreg:
    weight: 0.09
    kwargs:
      knots: 17
      num_proj: 1024

plan_config:
  horizon: 1
  receding_horizon: 1
  action_block: 5 # frameskip

# evaluation from dataset (replay expert trajectories)
eval:
  num_eval: 50
  goal_offset_steps: 25
  eval_budget: 50
  img_size: 224
  dataset_name: pusht_expert_train
  callables:
    # -- set state
    - method: _set_state
      args:
        state:
          value: state
    # -- set goal state
    - method: _set_goal_state
      args:
        goal_state:
          value: goal_state
          
output:
  filename: pusht_results.txt