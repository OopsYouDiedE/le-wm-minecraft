defaults:
  - _self_
  - data: minecraft

output_model_name: lewm
subdir: ${hydra:job.id}

num_workers: 8
train_split: 0.995
seed: 3072
img_size: 224
patch_size: 14
encoder_scale: tiny
dump_object: True

trainer:
  max_epochs: 200
  devices: auto
  accelerator: gpu
  precision: bf16
  gradient_clip_val: 1.0
  limit_train_batches: 500 # 👈 新增：每跑 500 个 Batch 就强行算作一个 Epoch 结束！

loader:
  batch_size: 64           # 👈 从 128 降到 32 或 64
  num_workers: 11           # 👈 从 6 - 8 降到 2
  prefetch_factor: 4       # 👈 够用了
  persistent_workers: True
  pin_memory: True

optimizer:
  type: AdamW
  lr: 5e-5
  weight_decay: 1e-3

wandb:
  enabled: True
  config:
    entity: oopsyoudied88-aaa
    project: my_train_true1
    name: ${output_model_name}
    id: ${subdir}
    resume: allow
    log_model: all

wm:
  type: lewm
  history_size: 3
  num_preds: 1
  embed_dim: 192

predictor:
  depth: 6
  heads: 16
  mlp_dim: 2048
  dim_head: 64
  dropout: 0.1
  emb_dropout: 0.0

loss:
  sigreg:
    weight: 0.09
    kwargs:
      knots: 17
      num_proj: 1024
